<div class="w-full text-white p-2">
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
    <!-- Columna Izquierda: Entrada y Configuración -->
    <div class="lg:col-span-7 space-y-4">
      <div>
        <label class="label">
          <span class="label-text text-gray-300 font-semibold flex items-center gap-2">
            <i class="fas fa-file-alt text-success"></i> Lista de Entrada
          </span>
          <span class="label-text-alt text-gray-400">Pega tus datos aquí (un elemento por línea o según separador)</span>
        </label>
        <textarea
          class="textarea textarea-bordered bg-neutral-900 border-neutral-700 text-white w-full h-[180px] focus:border-success focus:ring-1 focus:ring-success placeholder:text-neutral-500"
          placeholder="Ejemplo:&#10;juan morales&#10;maria gomez&#10;juan morales&#10;  pedro perez  "
          [(ngModel)]="inputText"
          (ngModelChange)="processList()"
        ></textarea>
      </div>

      <!-- Configuración -->
      <div class="bg-neutral-800/50 border border-neutral-700/60 rounded-xl p-4 space-y-4">
        <h3 class="text-sm font-bold text-success uppercase tracking-wider flex items-center gap-2">
          <i class="fas fa-sliders-h"></i> Ajustes de Depuración
        </h3>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- Opciones checkbox -->
          <div class="space-y-3">
            <label class="flex items-center space-x-3 cursor-pointer group">
              <input type="checkbox" [(ngModel)]="removeDuplicates" (ngModelChange)="processList()" class="checkbox checkbox-success checkbox-sm bg-neutral-900 border-neutral-600 focus:ring-success">
              <span class="text-sm text-gray-300 group-hover:text-white transition-colors">Eliminar duplicados</span>
            </label>
            <label class="flex items-center space-x-3 cursor-pointer group">
              <input type="checkbox" [(ngModel)]="trimSpaces" (ngModelChange)="processList()" class="checkbox checkbox-success checkbox-sm bg-neutral-900 border-neutral-600 focus:ring-success">
              <span class="text-sm text-gray-300 group-hover:text-white transition-colors">Limpiar espacios extremos y dobles</span>
            </label>
            <label class="flex items-center space-x-3 cursor-pointer group">
              <input type="checkbox" [(ngModel)]="removeEmptyLines" (ngModelChange)="processList()" class="checkbox checkbox-success checkbox-sm bg-neutral-900 border-neutral-600 focus:ring-success">
              <span class="text-sm text-gray-300 group-hover:text-white transition-colors">Omitir líneas vacías</span>
            </label>
          </div>

          <!-- Formato y Orden -->
          <div class="space-y-3">
            <div>
              <label class="text-xs text-gray-400 block mb-1">Formato de texto</label>
              <select [(ngModel)]="textFormat" (ngModelChange)="processList()" class="select select-bordered select-sm w-full bg-neutral-900 border-neutral-700 text-white focus:border-success">
                <option value="none">Sin cambios de mayúsculas</option>
                <option value="upper">MAYÚSCULAS</option>
                <option value="lower">minúsculas</option>
                <option value="title">Tipo Título (Primera Letra Mayúscula)</option>
              </select>
            </div>

            <div>
              <label class="text-xs text-gray-400 block mb-1">Orden alfabético</label>
              <select [(ngModel)]="sorting" (ngModelChange)="processList()" class="select select-bordered select-sm w-full bg-neutral-900 border-neutral-700 text-white focus:border-success">
                <option value="none">Sin ordenar</option>
                <option value="asc">Ascendente (A-Z)</option>
                <option value="desc">Descendente (Z-A)</option>
              </select>
            </div>
          </div>
        </div>

        <div class="border-t border-neutral-700/60 pt-3 grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="text-xs text-gray-400 block mb-1">Separador de entrada</label>
            <select [(ngModel)]="inputSeparator" (ngModelChange)="processList()" class="select select-bordered select-sm w-full bg-neutral-900 border-neutral-700 text-white focus:border-success">
              <option value="newline">Salto de línea</option>
              <option value="comma">Coma (,)</option>
              <option value="semicolon">Punto y coma (;)</option>
            </select>
          </div>

          <div>
            <label class="text-xs text-gray-400 block mb-1">Separador de salida</label>
            <select [(ngModel)]="outputSeparator" (ngModelChange)="processList()" class="select select-bordered select-sm w-full bg-neutral-900 border-neutral-700 text-white focus:border-success">
              <option value="newline">Salto de línea</option>
              <option value="comma">Coma (,)</option>
              <option value="semicolon">Punto y coma (;)</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- Columna Derecha: Salida y Métricas -->
    <div class="lg:col-span-5 flex flex-col justify-between space-y-4">
      <div>
        <label class="label">
          <span class="label-text text-gray-300 font-semibold flex items-center gap-2">
            <i class="fas fa-magic text-success"></i> Resultado Depurado
          </span>
        </label>
        <textarea
          readonly
          class="textarea textarea-bordered bg-neutral-900 border-neutral-700 text-success w-full h-[180px] focus:border-success focus:ring-1 focus:ring-success font-mono text-sm placeholder:text-neutral-600"
          placeholder="El resultado aparecerá aquí..."
          [value]="outputText"
        ></textarea>
      </div>

      <!-- Estadísticas en badges modernos -->
      <div class="grid grid-cols-3 gap-2 bg-neutral-800/30 border border-neutral-700/40 rounded-xl p-3 text-center">
        <div>
          <div class="text-xs text-gray-400">Entrada</div>
          <div class="text-xl font-bold text-white">{{ inputCount }}</div>
        </div>
        <div>
          <div class="text-xs text-gray-400">Duplicados</div>
          <div class="text-xl font-bold text-error">{{ duplicateCount }}</div>
        </div>
        <div>
          <div class="text-xs text-gray-400">Resultado</div>
          <div class="text-xl font-bold text-success">{{ outputCount }}</div>
        </div>
      </div>

      <!-- Botones de Acción -->
      <div class="flex gap-3 mt-auto pt-2">
        <button
          [disabled]="!outputText"
          (click)="copyToClipboard()"
          class="btn flex-1 transition-all duration-200"
          [ngClass]="isCopied ? 'btn-success text-success-content' : 'btn-outline btn-success hover:scale-[1.02]'"
        >
          <i class="fas" [ngClass]="isCopied ? 'fa-check' : 'fa-copy'"></i>
          {{ isCopied ? '¡Copiado!' : 'Copiar Resultado' }}
        </button>
        <button
          (click)="clearAll()"
          class="btn btn-outline btn-error hover:scale-[1.02]"
        >
          <i class="fas fa-trash-alt"></i> Limpiar
        </button>
      </div>
    </div>
  </div>
</div>
